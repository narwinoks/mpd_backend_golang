app:
  name: "SIMRS Enterprise"
  port: 8081
  env: "development"
  appname: "HIS"
  external_code: "MPD HIS"

database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "root"
  name: "his_database"
  sslmode: "disable"

database_test:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "root"
  name: "his_database_test"
  sslmode: "disable"

log:
  level: "debug"

jwt:
  secret: "your_jwt_secret_key_here"
  access_token_expiration: 15
  refresh_token_expiration: 7

redis:
  enabled: true
  host: "localhost"
  port: 6379
  password: ""
  db: 0

cors:
  allowed_origins: ["http://localhost:3000", "http://localhost:5173"]
  allowed_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
  allowed_headers: ["Origin", "Content-Type", "Accept", "Authorization", "X-Requested-With", "X-Response-ID"]
